name: PR

on: pull_request

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: JDK ${{ matrix.jdk }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        jdk: [21, 25]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.jdk }}
          distribution: corretto
          cache: maven

      - name: Download scanii-cli
        shell: bash
        run: |
          VERSION=latest
          OS="${{ runner.os }}"
          case "$OS" in
            Linux)   GOOS=linux   ;;
            macOS)   GOOS=darwin  ;;
            Windows) GOOS=windows ;;
          esac
          ARCH="$(uname -m)"
          case "$ARCH" in
            x86_64|amd64) GOARCH=amd64 ;;
            arm64|aarch64) GOARCH=arm64 ;;
            *) GOARCH=amd64 ;;
          esac
          EXT=""
          [ "$OS" = "Windows" ] && EXT=".exe"
          BASE_URL="https://github.com/uvasoftware/scanii-cli/releases/latest/download"
          BINARY="scanii-cli_${GOOS}_${GOARCH}${EXT}"
          curl -fsSL "$BASE_URL/$BINARY" -o sc${EXT}
          chmod +x sc${EXT}

      - name: Start scanii-cli server
        shell: bash
        run: |
          EXT=""
          [ "${{ runner.os }}" = "Windows" ] && EXT=".exe"
          ./sc${EXT} server &
          # wait for the server to be ready
          for i in $(seq 1 15); do
            curl -sf http://localhost:4000/ping && break || sleep 1
          done

      - name: mvn verify
        run: mvn -B verify
